server:
    port: 5000

spring:
    application:
        name: order
    data:
        mongodb:
            uri: ${MONGODB_URI}
    main:
        web-application-type: servlet

order-api:
    base-url: ${ORDER_API_BASE_URL}

springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui.html
        operationsSorter: method